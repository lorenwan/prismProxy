syntax = "proto3";

package prismproxy;

option go_package = "prismproxy/proto/gen/go;pb";

import "common.proto";

// HTTP 请求数据
message RequestData {
  map<string, StringList> headers = 1; // 请求头，值为字符串列表
  bytes body = 2;                       // 请求体
  int64 body_size = 3;                  // 请求体大小
  string content_type = 4;             // Content-Type
  bytes raw = 5;                        // 原始请求数据
}

// HTTP 响应数据
message ResponseData {
  int32 status_code = 1;               // HTTP 状态码
  string status_text = 2;              // 状态文本
  map<string, StringList> headers = 3; // 响应头
  bytes body = 4;                       // 响应体
  int64 body_size = 5;                  // 响应体大小
  string content_type = 6;             // Content-Type
  bytes raw = 7;                        // 原始响应数据
}

// 字符串列表，用于多值 header
message StringList {
  repeated string values = 1;
}

// 流量条目，对应一次完整的 HTTP 事务
message TrafficEntry {
  int64 id = 1;                // 唯一标识
  string timestamp = 2;        // 时间戳 (ISO 8601)
  int64 duration_ms = 3;       // 请求耗时 (毫秒)
  string method = 4;           // HTTP 方法
  string url = 5;              // 完整 URL
  string host = 6;             // 主机名
  string path = 7;             // 请求路径
  string scheme = 8;           // 协议 (http/https)
  string port = 9;             // 端口
  RequestData request = 10;    // 请求数据
  ResponseData response = 11;  // 响应数据
  string client_addr = 12;     // 客户端地址
  string server_ip = 13;       // 服务端 IP
  bool bookmarked = 14;        // 是否已收藏
  string color = 15;           // 标记颜色
  string notes = 16;           // 备注
  repeated string tags = 17;   // 标签列表
}

// 流量查询过滤器
message TrafficFilter {
  repeated string method = 1;        // HTTP 方法过滤
  repeated string host = 2;          // 主机名过滤
  string path = 3;                   // 路径模糊匹配
  repeated int32 status_code = 4;    // 状态码过滤
  repeated string content_type = 5;  // Content-Type 过滤
  int64 min_duration = 6;            // 最小耗时
  int64 max_duration = 7;            // 最大耗时
  TimeRange time_range = 8;          // 时间范围
  string search = 9;                 // 全文搜索
  optional bool bookmarked = 10;     // 是否收藏
  repeated string tags = 11;         // 标签过滤
}

// 按主机统计
message HostStat {
  string host = 1;
  int64 count = 2;
  double avg_time_ms = 3;
}

// 按方法统计
message MethodStat {
  string method = 1;
  int64 count = 2;
}

// 按状态码统计
message StatusStat {
  int32 status_code = 1;
  int64 count = 2;
}

// 流量统计信息
message TrafficStats {
  int64 total_requests = 1;          // 总请求数
  int64 total_responses = 2;         // 总响应数
  double avg_duration_ms = 3;        // 平均耗时
  int64 max_duration_ms = 4;         // 最大耗时
  int64 min_duration_ms = 5;         // 最小耗时
  int64 error_count = 6;             // 错误数
  int64 success_count = 7;           // 成功数
  repeated HostStat host_stats = 8;  // 主机统计
  repeated MethodStat method_stats = 9;   // 方法统计
  repeated StatusStat status_stats = 10;  // 状态码统计
}

// 流量事件 (WebSocket 推送)
message TrafficEvent {
  string type = 1;           // 事件类型: new / update / delete
  TrafficEntry entry = 2;    // 流量条目
  string timestamp = 3;      // 事件时间
}

// 流量服务 RPC 定义
service TrafficService {
  // 获取流量列表
  rpc List(TrafficListRequest) returns (TrafficListResponse);
  // 获取单条流量详情
  rpc Get(TrafficGetRequest) returns (TrafficEntry);
  // 删除流量记录
  rpc Delete(TrafficDeleteRequest) returns (Empty);
  // 清空所有流量
  rpc Clear(Empty) returns (Empty);
  // 获取流量统计
  rpc Stats(TrafficStatsRequest) returns (TrafficStats);
  // 订阅流量事件 (服务端流)
  rpc Subscribe(Empty) returns (stream TrafficEvent);
}

message TrafficListRequest {
  Pagination pagination = 1;
  TrafficFilter filter = 2;
}

message TrafficListResponse {
  repeated TrafficEntry items = 1;
  PageMeta meta = 2;
}

message TrafficGetRequest {
  int64 id = 1;
}

message TrafficDeleteRequest {
  repeated int64 ids = 1;
}

message TrafficStatsRequest {
  TimeRange time_range = 1;
}
